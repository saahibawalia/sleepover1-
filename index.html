
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Funny Animal Videos</title>

  <style>
    body {
      background-color: #fff5f8;
      text-align: center;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
    }

    h1 {
      font-size: 40px;
      text-shadow: 2px 2px 5px rgb(155, 182, 194);
      text-decoration: underline wavy rgb(155, 182, 194);
    }

     .carousel {
  width: 100%;
  overflow: hidden;
  margin-top: 40px;
}

.track {
  display: flex;
  gap: 40px;
  width: max-content;
  animation: scroll 25s linear infinite;
}

 .card {
  background: white;
  width: 230px;
  padding: 15px;
  padding-bottom: 40px; /* bottom white area */
  box-shadow: 0 15px 25px rgba(0,0,0,0.15);

  display: flex;
  flex-direction: column;
  align-items: center;
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  margin-bottom: 25px; 
}

.caption {
  left: 0;
  width: 100%;
  text-align: center; 
}
.card:hover {
  transform: rotate(0deg) scale(1.05);
}

    button {
      background-color: rgb(204, 131, 43);
      height: 50px;
      width: 200px;
      border: none;
      color: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 20px;
      transition: 0.3s;
    }

    button:hover {
      background-color: rgb(230, 160, 80);
      transform: scale(1.05);
    }

    a {
      text-decoration: none;
    }
@keyframes scroll {
  from {
    transform: translateX(0);
  }

  to {
    transform: translateX(-50%);
  }
}
  </style>
</head>

<body>
